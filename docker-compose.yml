services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - api
      - kibana
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./CRM.Web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID}
        VITE_ENVIRONMENT: production
    env_file: .env
    networks:
      - app_net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: CRM.Api/Dockerfile
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      # Override connection string so the API reaches the 'db' container, not localhost
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=crm_db;Username=crm_user;Password=${POSTGRES_PASSWORD}"
      # Elasticsearch — internal Docker URL, controlled via .env (Logging__Elastic__Enabled)
      Logging__Elastic__Enabled: ${Logging__Elastic__Enabled}
      Logging__Elastic__Url: "http://elasticsearch:9200"
      Logging__Elastic__Username: ${Logging__Elastic__Username}
      Logging__Elastic__Password: ${Logging__Elastic__Password}
    volumes:
      - api_logs:/app/logs
      - api_dataprotection:/app/dataprotection-keys
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - app_net
      - db_net
      - elk_net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
      - ./CRM.Database:/sql:ro
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - elk_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  elasticsearch-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk_net
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        echo "Setting kibana_system password..." &&
        curl -s -X POST -u "elastic:$$ELASTIC_PASSWORD"
        -H "Content-Type: application/json"
        "http://elasticsearch:9200/_security/user/kibana_system/_password"
        -d "{\"password\":\"$$KIBANA_SYSTEM_PASSWORD\"}"
        && echo " Done."
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.4
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      ELASTICSEARCH_USERNAME: "kibana_system"
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
      SERVER_BASEPATH: "/kibana"
      SERVER_REWRITEBASEPATH: "true"
    depends_on:
      elasticsearch:
        condition: service_healthy
      elasticsearch-setup:
        condition: service_completed_successfully
    networks:
      - app_net
      - elk_net
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
  elk_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  api_logs:
  api_dataprotection:
  elastic_data:

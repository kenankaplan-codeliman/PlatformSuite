services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - api
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./CRM.Web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID}
        VITE_ENVIRONMENT: production
    env_file: .env
    networks:
      - app_net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: CRM.Api/Dockerfile
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      # Override connection string so the API reaches the 'db' container, not localhost
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=crm_db;Username=crm_user;Password=${POSTGRES_PASSWORD}"
    volumes:
      - api_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
      - db_net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
      - ./CRM.Database:/sql:ro
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  api_logs:

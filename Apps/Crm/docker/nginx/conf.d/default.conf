upstream crm_frontend {
    server crm-web:80;
}

upstream crm_api {
    server crm-api:8080;
}

upstream crm_kibana {
    server crm-kibana:5601;
}

server {
    listen 80;
    server_name _;

    # Frontend SPA
    location / {
        proxy_pass http://crm_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # .NET API — strip /api prefix before forwarding
    location /api/ {
        proxy_pass http://crm_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_read_timeout 120s;
    }

    # Kibana — base path /kibana handled by Kibana (SERVER_BASEPATH + SERVER_REWRITEBASEPATH)
    location /kibana {
        proxy_pass http://crm_kibana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
